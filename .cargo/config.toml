# NOTE: FFMPEG_DIR / PKG_CONFIG_PATH are intentionally NOT set here.
# Cargo's [env] section is global and would leak Windows paths
# (C:\ffmpeg-velocut) into macOS/Linux builds, causing bindgen to
# generate opaque structs against a nonexistent include dir. Each
# platform's CI job sets these env vars explicitly in build.yml.
[target.x86_64-pc-windows-gnu]
rustflags = [
  "-L", "/mingw64/lib",
  "-L", "/mingw64/lib/gcc/x86_64-w64-mingw32/15.2.0",
  "-C", "target-cpu=native",
]
