name: Build

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # FFmpeg source tag — must match the version the fork expects (ffmpeg-8.1).
  FFMPEG_VERSION: "n8.1"
  # Bump this manually whenever you change FFmpeg's ./configure flags,
  # pinned dependency versions (libvpl, nv-codec-headers, etc.), or anything
  # else that should invalidate the cached FFmpeg build. Editing unrelated
  # parts of this file (the cargo build step, artifact upload, etc.) will
  # NOT bust the cache, since the key below only depends on this number —
  # not a hash of the whole file.
  FFMPEG_BUILD_REV: "2"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Windows (MINGW64) — fully static single .exe with D3D11VA/NVENC/AMF/QSV
  # ──────────────────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-yasm
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-x264
            make
            git

      - name: Build libvpl (Intel QSV >= 2.6 required by FFmpeg 8.x)
        # Built from source instead of using the mingw-w64-x86_64-libvpl
        # pacman package: that package's static pkg-config metadata has
        # been unreliable for FFmpeg's configure link-test (see
        # https://github.com/oneapi-src/oneVPL/issues/110), which is the
        # likely cause of "ERROR: libvpl >= 2.6 not found" even when the
        # pkg-config version check on its own passes. Mirrors the Linux
        # job, which builds libvpl from source and does not hit this.
        run: |
          cd "$GITHUB_WORKSPACE"
          git clone --depth=1 https://github.com/intel/libvpl.git
          cd libvpl
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF \
                -DCMAKE_INSTALL_PREFIX=/mingw64 \
                -DCMAKE_INSTALL_LIBDIR=lib
          cmake --build build -j$(nproc)
          cmake --install build
          echo "vpl.pc found at: $(find /mingw64 -name 'vpl.pc')"
          pkg-config --exists --print-errors 'vpl >= 2.6'
          echo "libvpl version: $(pkg-config --modversion vpl)"

      - name: Install NVIDIA NVENC/NVDEC headers
        run: |
          cd "$GITHUB_WORKSPACE"
          git clone --depth=1 -b n12.2.72.0 https://github.com/FFmpeg/nv-codec-headers.git
          cd nv-codec-headers
          make PREFIX=/mingw64 install

      - name: Install AMD AMF headers
        run: |
          cd "$GITHUB_WORKSPACE"
          git clone --depth=1 https://github.com/GPUOpen-LibrariesAndSDKs/AMF.git
          mkdir -p /mingw64/include/AMF
          cp -r AMF/amf/public/include/* /mingw64/include/AMF/

      - name: Build FFmpeg (static, with HW accel)
        env:
          PKG_CONFIG_PATH: /mingw64/lib/pkgconfig
        run: |
          cd "$GITHUB_WORKSPACE"
          git clone --depth=1 -b ${{ env.FFMPEG_VERSION }} https://github.com/FFmpeg/FFmpeg.git ffmpeg-src
          cd ffmpeg-src
          # Fail fast: confirm libvpl's pkg-config file is visible before
          # ./configure, which otherwise reports a confusing
          # "libvpl >= 2.6 not found" later.
          echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
          pkg-config --exists --print-errors 'vpl >= 2.6' || {
            echo "vpl.pc not found; searching /mingw64 for it..."
            find /mingw64 -name 'vpl.pc' || true
            exit 1
          }
          echo "libvpl version: $(pkg-config --modversion vpl)"
          ./configure \
            --prefix=/c/ffmpeg-velocut \
            --target-os=mingw32 \
            --arch=x86_64 \
            --disable-shared \
            --enable-static \
            --disable-programs \
            --disable-doc \
            --disable-network \
            --disable-everything \
            --disable-bzlib \
            --disable-iconv \
            --enable-avcodec \
            --enable-avformat \
            --enable-avfilter \
            --enable-avdevice \
            --enable-swscale \
            --enable-swresample \
            --enable-avutil \
            --enable-protocol=file \
            --enable-demuxer=mov,mp4,matroska,avi,flv,ogg,wav,mp3,aac,webm,asf,mpeg,image2,mpegts \
            --enable-muxer=mp4,matroska,webm,image2 \
            --enable-decoder=h264,hevc,vp8,vp9,av1,mpeg2video,mpeg4,mjpeg,prores,dnxhd,wmv1,wmv2,theora,vorbis,opus,aac,mp3,flac,pcm_s16le,pcm_s24le,pcm_s32le,pcm_f32le,ac3,eac3,dts,wmav2,png \
            --enable-encoder=libx264,aac,png \
            --enable-filter=scale,format,aformat,concat,atrim,trim,setpts,asetpts,fps,blend,volume,amix,aresample,color,overlay,pad,crop,rotate \
            --enable-bsf=h264_mp4toannexb,aac_adtstoasc,hevc_mp4toannexb \
            --enable-parser=h264,hevc,aac,mp3,vp8,vp9,av1,ac3,mpeg4video,opus,vorbis,png \
            --enable-libx264 \
            --enable-gpl \
            --enable-nvenc \
            --enable-nvdec \
            --enable-cuvid \
            --enable-encoder=h264_nvenc,hevc_nvenc,av1_nvenc \
            --enable-decoder=h264_cuvid,hevc_cuvid,vp8_cuvid,vp9_cuvid,av1_cuvid \
            --enable-amf \
            --enable-encoder=h264_amf,hevc_amf,av1_amf \
            --enable-d3d11va \
            --enable-dxva2 \
            --enable-libvpl \
            --enable-encoder=h264_qsv,hevc_qsv,av1_qsv \
            --enable-decoder=h264_qsv,hevc_qsv \
            --enable-filter=scale_qsv,vpp_qsv \
            --extra-cflags="-I/mingw64/include -I/mingw64/include/vpl" \
            --extra-ldflags="-L/mingw64/lib -static" \
            --extra-libs="-lstdc++" \
            --pkg-config-flags="--static"
          make -j$(nproc)
          make install

      - name: Dump FFmpeg config.log on failure
        if: failure()
        run: |
          echo "----- config.log (last 200 lines) -----"
          tail -n 200 "$GITHUB_WORKSPACE/ffmpeg-src/ffbuild/config.log" || true
          echo "----- grep for vpl -----"
          grep -i -A5 -B5 vpl "$GITHUB_WORKSPACE/ffmpeg-src/ffbuild/config.log" || true

      - name: Rename .dll.a stubs for true static linking
        run: |
          mv /mingw64/lib/libx264.dll.a /mingw64/lib/libx264.dll.a.bak || true
          mv /mingw64/lib/libz.dll.a /mingw64/lib/libz.dll.a.bak || true
          mv /mingw64/lib/libvpl.dll.a /mingw64/lib/libvpl.dll.a.bak || true

      - name: Build velocut
        env:
          FFMPEG_DIR: /c/ffmpeg-velocut
          PKG_CONFIG_PATH: /c/ffmpeg-velocut/lib/pkgconfig:/mingw64/lib/pkgconfig
          LIBCLANG_PATH: /mingw64/bin
          BINDGEN_EXTRA_CLANG_ARGS: "--target=x86_64-w64-mingw32 -I/mingw64/include"
          PKG_CONFIG_ALL_STATIC: "1"
        run: |
          cargo build --release --features velocut-ui/winresource

      - name: Diagnose AVFormatContext opaque-struct failure
        if: failure()
        run: |
          echo "----- Which avformat.h did bindgen actually see? -----"
          find /c/ffmpeg-velocut/include -name 'avformat.h' -exec ls -la {} \;
          find /mingw64/include -iname 'avformat.h' 2>/dev/null && echo "^^ CONFLICTING avformat.h FOUND UNDER /mingw64/include" || echo "no conflicting header under /mingw64/include"

          echo "----- Full verbose rebuild capturing bindgen's real clang invocation and warnings -----"
          cargo build --release --features velocut-ui/winresource -vv > /tmp/full_build.log 2>&1 || true
          echo "----- clang/bindgen warnings on AVFormatContext -----"
          grep -n -i "AVFormatContext\|cannot compute\|opaque\|warning:" /tmp/full_build.log | head -n 100
          echo "----- last 150 lines of full log -----"
          tail -n 150 /tmp/full_build.log

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: velocut-windows
          path: target/release/velocut.exe

  # ──────────────────────────────────────────────────────────────────────────
  # Linux — static FFmpeg libs, dynamic glibc (portable across modern distros)
  # ──────────────────────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential nasm yasm git cmake pkg-config \
            libx264-dev clang libclang-dev curl \
            libva-dev libva-drm2 libdrm-dev \
            libasound2-dev \
            libx11-dev

      - name: Cache built libvpl + FFmpeg static libs
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: |
            /opt/ffmpeg-static
            /usr/local/lib/libvpl.a
            /usr/local/lib/pkgconfig/vpl.pc
            /usr/local/include/vpl
          # Bust the cache when FFMPEG_VERSION or FFMPEG_BUILD_REV change
          # (bump FFMPEG_BUILD_REV above whenever you edit the configure
          # flags or pinned versions in the steps below). Unrelated edits
          # elsewhere in this file no longer force a rebuild.
          key: ffmpeg-linux-${{ env.FFMPEG_VERSION }}-rev${{ env.FFMPEG_BUILD_REV }}

      - name: Build libvpl (Intel QSV >= 2.6 required by FFmpeg 8.x)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          git clone --depth=1 https://github.com/intel/libvpl.git
          cd libvpl
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DCMAKE_INSTALL_LIBDIR=lib \
                -DCMAKE_PREFIX_PATH=/usr/local
          cmake --build build -j$(nproc)
          sudo cmake --install build
          # Make the installed pkg-config file discoverable.
          echo "PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          # Fail fast with a clear message instead of a confusing error later
          # inside FFmpeg's ./configure if the .pc file didn't land where expected.
          export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
          echo "vpl.pc found at: $(find /usr/local -name 'vpl.pc')"
          pkg-config --exists --print-errors 'vpl >= 2.6'
          echo "libvpl version: $(pkg-config --modversion vpl)"

      - name: Install NVIDIA NVENC/NVDEC headers
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          git clone --depth=1 -b n12.2.72.0 https://github.com/FFmpeg/nv-codec-headers.git
          cd nv-codec-headers
          sudo make install

      - name: Install AMD AMF headers
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          git clone --depth=1 https://github.com/GPUOpen-LibrariesAndSDKs/AMF.git
          sudo mkdir -p /usr/local/include/AMF
          sudo cp -r AMF/amf/public/include/* /usr/local/include/AMF/

      - name: Build FFmpeg (static, with HW accel)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
        run: |
          cd /tmp
          git clone --depth=1 -b ${{ env.FFMPEG_VERSION }} https://github.com/FFmpeg/FFmpeg.git
          cd FFmpeg
          export PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
          ./configure \
            --prefix=/opt/ffmpeg-static \
            --disable-shared \
            --enable-static \
            --disable-programs \
            --disable-doc \
            --disable-network \
            --disable-everything \
            --disable-bzlib \
            --enable-avcodec \
            --enable-avformat \
            --enable-avfilter \
            --enable-avdevice \
            --enable-swscale \
            --enable-swresample \
            --enable-avutil \
            --enable-protocol=file \
            --enable-demuxer=mov,mp4,matroska,avi,flv,ogg,wav,mp3,aac,webm,asf,mpeg,image2,mpegts \
            --enable-muxer=mp4,matroska,webm,image2 \
            --enable-decoder=h264,hevc,vp8,vp9,av1,mpeg2video,mpeg4,mjpeg,prores,dnxhd,vorbis,opus,aac,mp3,flac,pcm_s16le,pcm_s24le,pcm_s32le,pcm_f32le,ac3,eac3,dts,png \
            --enable-encoder=libx264,aac,png \
            --enable-filter=scale,format,aformat,concat,atrim,trim,setpts,asetpts,fps,blend,volume,amix,aresample,color,overlay,pad,crop,rotate \
            --enable-bsf=h264_mp4toannexb,aac_adtstoasc,hevc_mp4toannexb \
            --enable-parser=h264,hevc,aac,mp3,vp8,vp9,av1,ac3,mpeg4video,opus,vorbis,png \
            --enable-libx264 \
            --enable-gpl \
            --enable-nvenc \
            --enable-nvdec \
            --enable-cuvid \
            --enable-encoder=h264_nvenc,hevc_nvenc,av1_nvenc \
            --enable-decoder=h264_cuvid,hevc_cuvid,vp9_cuvid,av1_cuvid \
            --enable-amf \
            --enable-encoder=h264_amf,hevc_amf \
            --enable-vaapi \
            --enable-encoder=h264_vaapi,hevc_vaapi,av1_vaapi \
            --enable-filter=scale_vaapi,deinterlace_vaapi,overlay_vaapi \
            --enable-libvpl \
            --enable-encoder=h264_qsv,hevc_qsv,av1_qsv \
            --enable-decoder=h264_qsv,hevc_qsv \
            --enable-filter=scale_qsv,vpp_qsv \
            --extra-cflags="-I/usr/local/include -I/usr/local/include/vpl" \
            --extra-ldflags="-L/usr/local/lib" \
            --extra-libs="-lstdc++ -lpthread -lm -ldl" \
            --pkg-config-flags="--static"
          make -j$(nproc)
          sudo make install

      - name: Dump FFmpeg config.log on failure
        if: failure()
        run: |
          echo "----- config.log (last 200 lines) -----"
          tail -n 200 /tmp/FFmpeg/ffbuild/config.log || true
          echo "----- grep for vpl -----"
          grep -i -A5 -B5 vpl /tmp/FFmpeg/ffbuild/config.log || true

      - name: Build velocut
        env:
          FFMPEG_DIR: /opt/ffmpeg-static
          # Include /usr/local/lib/pkgconfig so libvpl's pkg-config is found
          # (used by bindgen / other crates that do call pkg-config directly).
          PKG_CONFIG_PATH: /opt/ffmpeg-static/lib/pkgconfig:/usr/local/lib/pkgconfig
          # libclang-dev installs to /usr/lib/llvm-14/lib on ubuntu-22.04.
          LIBCLANG_PATH: /usr/lib/llvm-14/lib
          # When FFMPEG_DIR is set, ffmpeg-sys-the-third's build.rs skips
          # pkg-config entirely and links a small hardcoded list of system
          # libs (asound, x264, z, vpl, pthread, m, stdc++, dl) — it doesn't
          # know about VAAPI. The compiled libavcodec.a/libavutil.a *do*
          # reference libva symbols (vaCreateBuffer, vaBeginPicture, etc.)
          # because --enable-vaapi was passed to FFmpeg's own ./configure,
          # so we have to link them in manually here or the final binary
          # fails with "undefined symbol: vaXxx" at link time.
          # hwcontext_vaapi.c also uses the DRM and X11 VAAPI backends
          # (drmGetVersion, XOpenDisplay, etc.), so those need linking too.
          RUSTFLAGS: "-l va -l va-drm -l va-x11 -l drm -l X11"
        run: |
          cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: velocut-linux
          path: target/release/velocut

  # ──────────────────────────────────────────────────────────────────────────
  # macOS — static FFmpeg libs, VideoToolbox HW accel (Apple Silicon + Intel)
  # ──────────────────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew install nasm yasm pkg-config cmake x264 llvm

      - name: Cache built FFmpeg static libs
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /opt/ffmpeg-macos
          key: ffmpeg-macos-${{ env.FFMPEG_VERSION }}-rev${{ env.FFMPEG_BUILD_REV }}

      - name: Build FFmpeg (static, with VideoToolbox)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          cd /tmp
          git clone --depth=1 -b ${{ env.FFMPEG_VERSION }} https://github.com/FFmpeg/FFmpeg.git
          cd FFmpeg
          BREW_PREFIX=$(brew --prefix)
          ./configure \
            --prefix=/opt/ffmpeg-macos \
            --disable-shared \
            --enable-static \
            --disable-programs \
            --disable-doc \
            --disable-network \
            --disable-everything \
            --disable-bzlib \
            --enable-avcodec \
            --enable-avformat \
            --enable-avfilter \
            --enable-avdevice \
            --enable-swscale \
            --enable-swresample \
            --enable-avutil \
            --enable-protocol=file \
            --enable-demuxer=mov,mp4,matroska,avi,flv,ogg,wav,mp3,aac,webm,asf,mpeg,image2,mpegts \
            --enable-muxer=mp4,matroska,webm,mov,image2 \
            --enable-decoder=h264,hevc,vp8,vp9,av1,mpeg2video,mpeg4,mjpeg,prores,dnxhd,vorbis,opus,aac,mp3,flac,pcm_s16le,pcm_s24le,pcm_s32le,pcm_f32le,ac3,dts,png \
            --enable-encoder=libx264,aac,png,prores \
            --enable-filter=scale,format,aformat,concat,atrim,trim,setpts,asetpts,fps,blend,volume,amix,aresample,color,overlay,pad,crop,rotate \
            --enable-bsf=h264_mp4toannexb,aac_adtstoasc,hevc_mp4toannexb \
            --enable-parser=h264,hevc,aac,mp3,vp8,vp9,av1,ac3,mpeg4video,opus,vorbis,png \
            --enable-libx264 \
            --enable-gpl \
            --enable-videotoolbox \
            --enable-audiotoolbox \
            --enable-encoder=h264_videotoolbox,hevc_videotoolbox,prores_videotoolbox \
            --enable-decoder=h264_videotoolbox,hevc_videotoolbox \
            --extra-cflags="-I${BREW_PREFIX}/include" \
            --extra-ldflags="-L${BREW_PREFIX}/lib" \
            --pkg-config-flags="--static"
          make -j$(sysctl -n hw.logicalcpu)
          sudo make install

      - name: Build velocut
        env:
          FFMPEG_DIR: /opt/ffmpeg-macos
          PKG_CONFIG_PATH: /opt/ffmpeg-macos/lib/pkgconfig
          # Homebrew's llvm provides libclang.dylib — required by the bindgen
          # build script in ffmpeg-sys-the-third.
          LIBCLANG_PATH: /opt/homebrew/opt/llvm/lib
          # Force the pkg-config crate to request --static output so the
          # Libs.private transitive deps are emitted.
          PKG_CONFIG_ALL_STATIC: "1"
        run: |
          cargo build --release

      - name: Diagnose AVFormatContext bindgen failure
        if: failure()
        run: |
          echo "----- Is avformat.h actually installed, and does it look complete? -----"
          ls -la /opt/ffmpeg-macos/include/libavformat/ || true
          wc -l /opt/ffmpeg-macos/include/libavformat/avformat.h || true

          echo "----- Does the struct body survive a plain clang preprocess? -----"
          echo '#include <libavformat/avformat.h>' > /tmp/probe.c
          clang -E -I/opt/ffmpeg-macos/include /tmp/probe.c -o /tmp/avformat.i 2>/tmp/clang_errors.txt
          echo "--- clang stderr (truncated) ---"
          head -n 100 /tmp/clang_errors.txt
          echo "--- struct AVFormatContext body, if present ---"
          grep -A 15 "^struct AVFormatContext {" /tmp/avformat.i | head -n 20 || echo "STRUCT BODY NOT FOUND IN PREPROCESSED OUTPUT"

          echo "----- Full verbose rebuild, unfiltered, to a log file -----"
          cargo build --release -vv > /tmp/full_build.log 2>&1 || true
          echo "----- last 150 lines of full build log (this is where the panic message lives) -----"
          tail -n 150 /tmp/full_build.log
          echo "----- explicit panic/error grep (context only, not a filter on the log itself) -----"
          grep -n -i "panicked\|error\[\|error:" /tmp/full_build.log || echo "no panic/error string matched — check the tail above manually"


      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: velocut-macos
          path: target/release/velocut

  # ──────────────────────────────────────────────────────────────────────────
  # Release — create a GitHub Release with all three binaries on tag push
  # ──────────────────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/velocut-windows/velocut.exe release/velocut-windows.exe
          cp artifacts/velocut-linux/velocut release/velocut-linux
          cp artifacts/velocut-macos/velocut release/velocut-macos
          chmod +x release/velocut-linux release/velocut-macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/velocut-windows.exe
            release/velocut-linux
            release/velocut-macos